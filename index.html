
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Apoiwnd</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            background: url('https://raw.githubusercontent.com/Apoiwnd/Apoiwnd.github.io/main/528336ld.jpg') no-repeat center center;   
            background-size: cover;
            background-attachment: fixed;
            font-family:"华文行楷",cursive;
            text-align:center;
            padding-top:80px;
        }
        .avatar{
            width:160px;
            height:160px;
            border-radius:50%;
            border:4px solid white;
            box-shadow:0 0 25px white;
        }
        h1{
            font-size:55px;
            margin-bottom:20px;
        }
        .gradient{
            background: linear-gradient(to right, #7cb342, #b88645, #fdd835);
            -webkit-background-clip: text;
            color: transparent;
        }
        p{
            font-size:26px;
            line-height:2.5;
            margin:12px 0;
        }
    </style>
</head>
<body>

<h1 class="gradient">Apoiwnd</h1>
<p style="font-size:16px;color:#fff;">春宵恋恋变卦</p>
<hr style="border:rgba(255,255,255,0.4)">

<img class="avatar" src="https://raw.githubusercontent.com/Apoiwnd/Apoiwnd.github.io/main/515593ld.jpg">

<p class="gradient">🌹</p>
<p class="gradient">真真假假</p>
<p class="gradient">花色香皆看化</p>

</body>
</html>
